source = ~/.config/hypr/nvidia.conf
# ##################################################
# ##  _   _                  _                 _  ##
# ## | | | |_   _ _ __  _ __| | __ _ _ __   __| | ##
# ## | |_| | | | | '_ \| '__| |/ _` | '_ \ / _` | ##
# ## |  _  | |_| | |_) | |  | | (_| | | | | (_| | ##
# ## |_| |_|\__, | .__/|_|  |_|\__,_|_| |_|\__,_| ##
# ##        |___/|_|                              ##
# ##################################################

$mainMod = SUPER
# open G-Hyprland script
# windowrulev2=float,title:^(G-Hyprland)
bind = $mainMod, S, exec, footclient -w 750x600 -T G-Hyprland -e ~/.config/hypr/brain/brain.sh
# disable G-hyprland
bind = $mainMod SHIFT, G, exec, footclient -e ~/.local/bin/bear/implement_gum.sh disable

# Terminal focus-based opacity for better readability
windowrulev2 = opacity 1.0 override, class:^(Alacritty)$, focus:1
windowrulev2 = opacity 0.92 override, class:^(Alacritty)$, focus:0

# ##############################################
# ##                           _              ##
# ##  ___  ___  _   _ _ __ ___(_)_ __   __ _  ##
# ## / __|/ _ \| | | | '__/ __| | '_ \ / _` | ##
# ## \__ \ (_) | |_| | | | (__| | | | | (_| | ##
# ## |___/\___/ \__,_|_|  \___|_|_| |_|\__, | ##
# ##                                   |___/  ##
# ##############################################

source = ~/.config/hypr/settings/monitor.conf
source = ~/.config/hypr/settings/background.conf
source = ~/.config/hypr/settings/eye_protection.conf
source = ~/.config/hypr/settings/status_bar.conf
source = ~/.config/hypr/settings/window_gaps.conf
source = ~/.config/hypr/settings/corners.conf
source = ~/.config/hypr/settings/blur_system.conf
source = ~/.config/hypr/settings/manual_settings.conf
source = ~/.config/hypr/settings/animations.conf
source = ~/.config/hypr/settings/shadow_range.conf
source = ~/.config/hypr/settings/shadow_color.conf
source = ~/.config/hypr/settings/border_size.conf
source = ~/.config/hypr/settings/border_color_active.conf
source = ~/.config/hypr/settings/border_color_inactive.conf
source = ~/.config/hypr/settings/layouts.conf

# New improvements - comment out or delete file to rollback
source = ~/.config/hypr/settings/improvements.conf

# Execute HyDE startup script
exec-once = ~/.config/hypr/scripts/startup.sh

# Wallpaper switching keybind
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-switch.sh

# Waybar window rules
layerrule = blur, waybar
layerrule = ignorezero, waybar

# AGS Profile Mode Switching
bind = $mainMod CTRL, P, exec, /home/jeff/.config/ags/ags-hyprland-config/switch-mode.sh programming
bind = $mainMod CTRL, G, exec, /home/jeff/.config/ags/ags-hyprland-config/switch-mode.sh gaming
