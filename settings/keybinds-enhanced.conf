# Enhanced Keybindings for AGS Bar Control
# Add these to your hyprland.conf

$mainMod = SUPER

# AGS Bar Controls
bind = $mainMod SHIFT, B, exec, ~/.config/ags/scripts/switch-bar.sh enhanced
bind = $mainMod SHIFT, C, exec, ~/.config/ags/scripts/switch-bar.sh classic
bind = $mainMod SHIFT, G, exec, ~/.config/ags/scripts/switch-bar.sh gaming
bind = $mainMod SHIFT, P, exec, ~/.config/ags/scripts/switch-bar.sh programming

# Quick launch for development tools (Programming mode)
bind = $mainMod, code, exec, code
bind = $mainMod, T, exec, alacritty
bind = $mainMod, F, exec, firefox
bind = $mainMod, D, exec, [float; size 800 600] gnome-calculator

# Gaming mode shortcuts
bind = $mainMod, G, exec, steam
bind = $mainMod SHIFT, M, exec, mangohud

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop

# Volume controls with visual feedback
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness controls (for laptops)
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Reload AGS
bind = $mainMod SHIFT, R, exec, pkill -x ags; cd ~/.config/ags && ags run app-enhanced.ts &