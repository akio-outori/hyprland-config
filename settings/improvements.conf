# ################################################
# ## Hyprland Improvements - Easy to rollback   ##
# ## Comment out any section you don't want     ##
# ## Or delete this file to remove all changes  ##
# ################################################

$mainMod = SUPER

# ################################################
# ## Misc Settings (Performance + Features)      ##
# ################################################

misc {
    # Window Swallowing - Hides terminal when launching GUI apps
    enable_swallow = true
    swallow_regex = ^(footclient|foot|kitty|alacritty|wezterm)$
    
    # Better focus behavior
    focus_on_activate = true
    
    # Faster animations
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

# ################################################
# ## Essential Missing Keybinds                 ##
# ################################################

# Center floating windows
bind = $mainMod, C, centerwindow

# Pin window (always on top)
bind = $mainMod, Y, pin

# Focus urgent/important windows
bind = $mainMod, U, focusurgentorlast

# ################################################
# ## Special Workspace (Scratchpad)             ##
# ## For calculator, notes, etc                 ##
# ################################################

# Toggle special workspace
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Quick scratchpad apps
bind = $mainMod, minus, exec, footclient
bind = $mainMod SHIFT, minus, exec, galculator

# ################################################
# ## Window Group Management                    ##
# ################################################

bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, lockgroups, toggle
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b

# ################################################
# ## Better Animations                          ##
# ## Snappier, more responsive feel             ##
# ################################################

animations {
    enabled = yes
    
    # Snappier bezier curves
    bezier = fastEase, 0.25, 0.1, 0.25, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    
    animation = windows, 1, 3, fastEase
    animation = windowsOut, 1, 3, smoothOut
    animation = windowsIn, 1, 3, smoothIn
    animation = border, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, fastEase
}

# ################################################
# ## Quality of Life Improvements               ##
# ################################################

# Different opacity for active/inactive windows
# Exclude AGS from opacity rules
windowrule = opacity 1.0 1.0, match:class ^(ags)$
windowrule = opacity 0.95 0.85, match:float 0
windowrule = opacity 1.0 0.9, match:float 0, match:focus 1

# Auto-float certain window types
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Media viewer)$

# Picture-in-Picture stays on top and in corner
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = move 75% 75%, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$

# ################################################
# ## Workspace Organization                     ##
# ## Auto-assign apps to workspaces             ##
# ################################################

