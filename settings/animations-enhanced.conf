# Enhanced Animations Configuration for Hyprland
# Smooth, modern animations optimized for programming and gaming

animations {
    enabled = yes
    
    # Bezier curves for different animation types
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeInOutQuart, 0.76, 0, 0.24, 1
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    bezier = easeInQuart, 0.76, 0, 0.24, 1
    bezier = smoothSpring, 0.68, -0.55, 0.265, 1.55
    bezier = overshot, 0.68, -0.6, 0.32, 1.6
    
    # Window animations
    animation = windows, 1, 5, easeOutExpo, popin 85%
    animation = windowsIn, 1, 5, easeOutExpo, popin 85%
    animation = windowsOut, 1, 4, easeInQuart, popin 85%
    animation = windowsMove, 1, 4, easeOutQuart
    
    # Fade animations
    animation = fade, 1, 3, easeInOutQuart
    animation = fadeIn, 1, 3, easeOutQuart
    animation = fadeOut, 1, 3, easeInQuart
    animation = fadeDim, 1, 3, easeInOutQuart
    
    # Border animations
    animation = border, 1, 4, easeInOutQuart
    animation = borderangle, 1, 30, smoothSpring, loop
    
    # Workspace animations
    animation = workspaces, 1, 4, easeOutExpo, slide
    animation = specialWorkspace, 1, 4, easeOutExpo, slidevert
}

# Window blur for glassmorphism effect
decoration {
    rounding = 14
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 1.0
        brightness = 1.0
        special = true
    }
    
    # Window shadows
    drop_shadow = yes
    shadow_range = 20
    shadow_render_power = 3
    shadow_offset = 0 8
    col.shadow = rgba(000000AA)
    col.shadow_inactive = rgba(00000066)
    
    # Active/Inactive window opacity
    active_opacity = 0.98
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
    
    # Dim inactive windows
    dim_inactive = false
    dim_strength = 0.1
}