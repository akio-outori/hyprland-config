# NVIDIA-specific environment variables
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_DRM_NO_ATOMIC,1
env = NVIDIA_PRESERVE_VIDEO_MEMORY_ALLOCATIONS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = __NV_PRIME_RENDER_OFFLOAD,1

# Performance optimizations
misc {
    # Disable VRR for stability
    vrr = 0
    # Variable framerate for better performance
    vfr = true
    # Disable DPMS on mouse move
    mouse_move_enables_dpms = true
}

# Reduced blur for performance
decoration {
    blur {
        enabled = true
        size = 3
        passes = 1
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
        new_optimizations = true
        xray = false
    }
}

# Optimized animations
animations {
    enabled = yes
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.5, 0, 0.5, 1
    
    animation = windows, 1, 2, smooth
    animation = windowsOut, 1, 2, smooth, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, smooth, slide
}

# Window rules for performance
windowrule = no_shadow on, match:float 0
windowrule = force_rgbx on, match:class ^(chromium)$
windowrule = force_rgbx on, match:class ^(google-chrome)$
